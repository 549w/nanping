# ============================================================
# Nanping Docker Compose
# 仅运行后端容器，前端由主机 Nginx 直接 serve
# ============================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanping-backend
    restart: unless-stopped

    # 仅绑定到本地回环 — 只有主机 Nginx 能访问，不暴露到公网
    ports:
      - "127.0.0.1:8000:8000"

    # SQLite 数据持久化
    volumes:
      - nanping_data:/app/data

    # 生产环境变量
    env_file:
      - .env.production

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # 日志轮转，防止磁盘写满
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  nanping_data:
    # 命名卷，docker compose down 不会删除
