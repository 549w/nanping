<main class="container" style="max-width: 600px; margin-top: 2rem; margin-bottom: 3rem;">
  <h1>支持「南评」</h1>

  <p>南评是一个个人开发维护的非营利项目，所有功能免费开放。</p>
  <p>如果你觉得南评对你的选课有帮助，可以考虑请作者喝杯咖啡 ☕</p>

  <section style="margin-top: 2rem;">
    <h2>赞助说明</h2>
    <p>赞助资金将全部用于：</p>
    <ul>
      <li>服务器和域名续费</li>
      <li>数据库备份存储</li>
      <li>其他基础设施维护</li>
    </ul>
    <p>赞助是完全自愿的，无论是否赞助都不影响你使用南评的任何功能。</p>
  </section>

  <section style="margin-top: 2rem;">
    <h2>请作者喝杯咖啡</h2>

    <div style="
      display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center;
      margin-top: 1.5rem;
    ">
      <div style="text-align: center; max-width: 220px;">
        <div style="
          width: 200px; height: 200px; margin: 0 auto 0.5rem;
          border: 1px solid var(--pico-muted-border-color);
          border-radius: 8px;
          display: flex; align-items: center; justify-content: center;
          color: var(--pico-muted-color); font-size: 0.85rem;

          微信赞赏码<br>（待上传）
        </div>
        <span style="font-size: 0.85rem; color: var(--pico-muted-color);">微信</span>
      </div>

      <div style="text-align: center; max-width: 220px;">

          width: 200px; height: 200px; margin: 0 auto 0.5rem;
